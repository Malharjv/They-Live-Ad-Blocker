<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="popup__header">
      <h1 class="popup__title">THEY LIVE</h1>
    </header>

    <div class="popup__toggle-row">
      <span class="popup__sunglasses" id="sunglasses" role="img" aria-label="Sunglasses on">🕶️</span>
      <label class="toggle">
        <input type="checkbox" id="toggle" />
        <span class="toggle__track">
          <span class="toggle__thumb"></span>
        </span>
      </label>
    </div>

    <p class="popup__status" id="status">Revealing ads</p>

    <p class="popup__hint">Toggle off — page stays completely unchanged.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
